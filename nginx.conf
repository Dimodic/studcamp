server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip на текст/json для заметного ускорения.
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # SPA-fallback: любой несуществующий путь отдаём index.html, чтобы
    # react-router на клиенте сам обработал маршрут.
    #
    # index.html намеренно НЕ кешируем: внутри ссылки на hashed JS/CSS,
    # и если клиент продолжит отдавать старый index, новый бандл никогда
    # не подхватится (в частности Telegram WebView любит долго держать).
    # Сам index крошечный (<1KB), так что без потерь.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires 0;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Прокси на API. Backend-сервис называется `api`, слушает 8000.
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # LLM-запросы могут быть длинными (180с таймаут на стороне backend).
        proxy_read_timeout 200s;
        proxy_send_timeout 200s;
    }

    # health-check: удобно дёргать curl http://host/health.
    location = /health {
        proxy_pass http://api:8000/health;
    }

    # Долгий кэш для хэшированных ассетов Vite.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
