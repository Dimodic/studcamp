# Конфигурация инструментов разработки для бэкенда.
# Runtime-зависимости — в backend/requirements.txt (pinned).
# Dev-зависимости — в backend/requirements-dev.txt.

[tool.ruff]
# Python 3.12 соответствует рантайму Docker-образа (см. backend/Dockerfile).
target-version = "py312"
line-length = 100
extend-exclude = ["alembic/versions"]

[tool.ruff.lint]
# Базовый набор + импорты + bugbear + комплексность + pyupgrade + naming.
select = [
  "E",   # pycodestyle errors
  "W",   # pycodestyle warnings
  "F",   # pyflakes
  "I",   # isort
  "B",   # flake8-bugbear
  "C4",  # flake8-comprehensions
  "UP",  # pyupgrade
  "N",   # pep8-naming
  "SIM", # flake8-simplify
  "RUF", # ruff-specific
]
ignore = [
  "B008",    # Depends() as default — идиома FastAPI
  "N805",    # first arg of pydantic validators не обязан быть `self`
  "RUF001",  # ambiguous string chars — у нас почти весь интерфейс на русском,
  "RUF002",  # кириллица неизбежно «похожа» на латиницу. Проверять не нужно.
  "RUF003",
]

[tool.ruff.lint.per-file-ignores]
# Pydantic-схемы публичного API намеренно в camelCase (контракт с фронтом).
"app/schemas/**/*.py" = ["N815"]
# Inline-Pydantic request-схемы в admin-роутах тоже в camelCase.
"app/api/routes/**/*.py" = ["N815"]
# Тесты и seed содержат длинные русскоязычные ассерты.
"tests/**/*.py" = ["E501", "N802"]
"alembic/versions/**/*.py" = ["E501"]
# Alembic env.py — стандартная практика: sys.path manipulation до импортов.
"alembic/env.py" = ["E402"]
# Системный промпт LLM — литеральная многострочная строка.
"app/services/llm_prompt.py" = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.12"
strict = true
# Alembic и миграции — генерируемый / транзитный код.
exclude = ["alembic/versions/"]
# Pydantic v2 поставляет свои стабы; подмодули сторонних либ могут быть без типов.
ignore_missing_imports = true
# FastAPI Depends() инжектит функции, которые mypy считает «неопределёнными».
warn_unused_ignores = true

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
pythonpath = [".."]
addopts = "-ra --strict-markers"

[tool.coverage.run]
source = ["app"]
omit = ["alembic/*", "tests/*"]

[tool.coverage.report]
show_missing = true
skip_covered = false
exclude_lines = [
  "pragma: no cover",
  "if TYPE_CHECKING:",
  "raise NotImplementedError",
]
