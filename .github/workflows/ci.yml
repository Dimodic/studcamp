name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck + lint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test
      - run: npm run build

  backend:
    name: Backend (ruff + mypy + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-dev.txt
      - name: Ruff
        working-directory: backend
        run: ruff check .
      - name: Ruff format
        working-directory: backend
        run: ruff format --check .
      - name: Mypy
        working-directory: backend
        run: mypy app
      - name: Pytest
        working-directory: backend
        env:
          STUDCAMP_ENV: test
          STUDCAMP_DATABASE_URL: "sqlite:///:memory:"
          STUDCAMP_CORS_ORIGINS: "http://localhost:5173"
        run: pytest --cov=app --cov-report=term-missing

  migrations:
    name: Alembic upgrade head (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: studcamp
          POSTGRES_PASSWORD: studcamp
          POSTGRES_DB: studcamp
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - run: python -m pip install --upgrade pip && python -m pip install -r backend/requirements.txt
      - name: Alembic upgrade head
        env:
          STUDCAMP_DATABASE_URL: "postgresql+psycopg://studcamp:studcamp@localhost:5432/studcamp"
        run: alembic -c backend/alembic.ini upgrade head
